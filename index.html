<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>POWERRANGERS</title>
    <style>
        body {
            margin: 0;
            background: black;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            cursor: pointer;
        }

        #video-container {
            display: none;
            width: 100vw;
            height: 100vh;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        h1 {
            font-size: 4rem;
            letter-spacing: 4px;
        }
    </style>
</head>
<body onclick="startVideo()">

    <h1 id="title">POWERRANGERS</h1>

    <div id="video-container">
        <iframe 
            src="https://www.youtube.com/embed/Fl-WGssGnak?autoplay=1&controls=1&modestbranding=1"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            allowfullscreen>
        </iframe>
    </div>

    <script>
        function startVideo() {
            document.getElementById("title").style.display = "none";
            document.getElementById("video-container").style.display = "block";
        }
    </script>

</body>
</html>
